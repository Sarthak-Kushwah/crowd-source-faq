# ═══════════════════════════════════════════════════════════════════════════════
#  Yaksha FAQ Portal — Build & Deploy to Staging
#  Inspired by vicharanashala/wa-client dockerhub-build-staging.yml
#
#  Triggers:
#    • Push to `develop` branch (auto build + deploy)
#    • Manual workflow_dispatch with build/deploy toggles
#
#  Required GitHub Secrets:
#    DOCKER_USERNAME      — Docker Hub account username (preferred)
#    DOCKER_PASSWORD      — Docker Hub access token (preferred)
#    DOCKERHUB_USERNAME   — Backward-compatible Docker Hub username fallback
#    DOCKERHUB_TOKEN      — Backward-compatible Docker Hub token fallback
#    STAGING_SSH_HOST      — Staging VPS hostname / IP
#    STAGING_SSH_USER      — SSH username on staging VPS
#    STAGING_SSH_KEY       — SSH private key for staging VPS
#    INFISICAL_TOKEN       — Infisical service token (staging environment)
#    INFISICAL_PROJECT_ID  — Infisical project ID
# ═══════════════════════════════════════════════════════════════════════════════

name: Build & Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      should_build:
        description: "Build and Push Images"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      should_deploy:
        description: "Deploy to Staging VPS"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  BACKEND_IMAGE: csfaq-backend
  INFISICAL_ENVIRONMENT: staging
  INFISICAL_SECRET_PATH: /
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN }}

jobs:
  # ── Build & Push Docker Images ─────────────────────────────────────────────
  build:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.should_build == 'true'
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: tags
        env:
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "backend_tags=${DOCKER_USERNAME}/${{ env.BACKEND_IMAGE }}:staging,${DOCKER_USERNAME}/${{ env.BACKEND_IMAGE }}:staging-$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build & Push Unified Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🐳 Unified Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend & Frontend (Unified) | \`staging\`, \`staging-${{ steps.tags.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy to Staging VPS ──────────────────────────────────────────────────
  deploy:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.should_deploy == 'true'
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    env:
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

    steps:
      - name: Deploy via SSH
        if: ${{ env.STAGING_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e

            cd ~/yaksha-faq || cd /opt/yaksha-faq

            echo "🔐 Logging in to Docker Hub on the staging host..."
            echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin

            echo "📦 Pulling latest staging unified image..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend

            echo "🚀 Deploying with docker-compose..."
            export TAG=staging
            export DOCKERHUB_USERNAME=${{ env.DOCKER_USERNAME }}
            export INFISICAL_TOKEN="${{ secrets.INFISICAL_TOKEN }}"
            export INFISICAL_ENVIRONMENT=${{ env.INFISICAL_ENVIRONMENT }}
            export INFISICAL_PROJECT_ID="${{ secrets.INFISICAL_PROJECT_ID }}"
            export INFISICAL_SECRET_PATH=${{ env.INFISICAL_SECRET_PATH }}

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

            echo "🏥 Waiting for health check..."
            sleep 10
            curl -sf --max-time 10 http://localhost:6767/csfaq/api/health || echo "⚠️ Health check failed — check logs"

            echo "✅ Staging deployment complete!"

      - name: Deployment Summary
        if: ${{ env.STAGING_SSH_HOST != '' }}
        run: |
          echo "### 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to staging VPS at \`${{ secrets.STAGING_SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`staging\` tag" >> $GITHUB_STEP_SUMMARY
